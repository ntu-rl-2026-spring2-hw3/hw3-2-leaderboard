name: Update Leaderboard

on:
  # Triggered remotely by the evaluation platform via GitHub API:
  #   POST /repos/{owner}/{repo}/dispatches
  #   Body: { "event_type": "submit_score", "client_payload": { ... } }
  repository_dispatch:
    types: [submit_score]

  # Also allow manual trigger from GitHub UI for testing
  workflow_dispatch:
    inputs:
      student_id:
        description: "Student ID (e.g. r12345678)"
        required: true
      results_json:
        description: |
          JSON results, e.g.:
          {"SeekAndSlayLevel0-v0":{"kills":25,"health":80,"ammo":50}}
        required: true
      delete:
        description: "Set to 'true' to delete the student's entry"
        required: false
        default: "false"

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push leaderboard.json

    steps:
      - uses: actions/checkout@v4

      # ── Resolve inputs (repository_dispatch or workflow_dispatch) ──
      - name: Set variables
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "student_id=${{ github.event.client_payload.student_id }}" >> $GITHUB_OUTPUT
            # results_json may contain special chars — write to file instead
            echo '${{ toJson(github.event.client_payload.results) }}' > /tmp/results.json
            echo "delete=${{ github.event.client_payload.delete || 'false' }}" >> $GITHUB_OUTPUT
          else
            echo "student_id=${{ inputs.student_id }}" >> $GITHUB_OUTPUT
            echo '${{ inputs.results_json }}' > /tmp/results.json
            echo "delete=${{ inputs.delete }}" >> $GITHUB_OUTPUT
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── Delete mode ───────────────────────────────────────────────
      - name: Delete entry
        if: steps.vars.outputs.delete == 'true'
        run: |
          python scripts/update_score.py \
            --student-id "${{ steps.vars.outputs.student_id }}" \
            --delete

      # ── Update mode ───────────────────────────────────────────────
      - name: Update score
        if: steps.vars.outputs.delete != 'true'
        run: |
          AUDIT=$(jq -n \
            --arg run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --arg triggered_by "${{ github.actor }}" \
            --arg event_type "${{ github.event_name }}" \
            '{run_url: $run_url, triggered_by: $triggered_by, event_type: $event_type}')
          python scripts/update_score.py \
            --student-id "${{ steps.vars.outputs.student_id }}" \
            --results "$(cat /tmp/results.json)" \
            --audit "$AUDIT"

      # ── Commit & push ─────────────────────────────────────────────
      - name: Commit updated leaderboard
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add leaderboard.json
          git diff --cached --quiet || git commit -m \
            "leaderboard: update ${{ steps.vars.outputs.student_id }}"
          git push
