<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NTU 2026 Spring 2 DRL HW3-2 LeaderBoard</title>
  <style>
    /* ─── Reset & base ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0f1a;
      --surface:   #151929;
      --surface2:  #1e2438;
      --border:    #2a3050;
      --accent:    #4f8ef7;
      --accent2:   #7c5af7;
      --gold:      #f5c842;
      --silver:    #b0bec5;
      --bronze:    #cd7f32;
      --green:     #4caf82;
      --red:       #e05c5c;
      --muted:     #6b7694;
      --text:      #dde3f5;
      --text-dim:  #8993b5;
      --radius:    10px;
      --row-hover: #1d2540;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
    }

    /* ─── Header ────────────────────────────────────────────────── */
    header {
      text-align: center;
      margin-bottom: 2rem;
    }


    h1 {
      font-size: clamp(1.3rem, 4vw, 2rem);
      font-weight: 700;
      letter-spacing: -.02em;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ─── Deploy timestamp ───────────────────────────────────────── */
    .deploy-time {
      text-align: center;
      font-size: .74rem;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    /* ─── Legend ────────────────────────────────────────────────── */
    .legend {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: .6rem 1.4rem;
      margin-top: 2rem;
      margin-bottom: 1.6rem;
      font-size: .75rem;
      color: var(--text-dim);
    }

    .legend-item { display: flex; align-items: center; gap: .4rem; }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ─── Score formula ──────────────────────────────────────────── */
    .formula-card code {
      font-family: 'Fira Code', 'Cascadia Code', monospace;
      color: var(--accent);
      font-size: .74rem;
    }

    /* ─── Table wrapper ─────────────────────────────────────────── */
    .table-wrap {
      max-width: 1100px;
      margin: 0 auto;
      overflow-x: auto;
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: .82rem;
    }

    /* Sticky rank + student-id columns */
    th.col-rank, td.col-rank {
      position: sticky;
      left: 0;
      z-index: 2;
      background: var(--surface2);
    }
    tbody td.col-rank { background: var(--bg); }
    tbody tr:hover td.col-rank { background: var(--row-hover); }

    th.col-sid, td.col-sid {
      position: sticky;
      left: 44px;   /* width of rank col */
      z-index: 2;
      background: var(--surface2);
    }
    tbody td.col-sid { background: var(--bg); }
    tbody tr:hover td.col-sid { background: var(--row-hover); }

    thead th {
      background: var(--surface2);
      color: var(--text-dim);
      font-weight: 600;
      font-size: .72rem;
      letter-spacing: .06em;
      text-transform: uppercase;
      padding: .7rem .9rem;
      white-space: nowrap;
      border-bottom: 1px solid var(--border);
      user-select: none;
      cursor: pointer;
    }

    thead th:hover { color: var(--text); }

    thead th .sort-icon {
      margin-left: .3rem;
      opacity: .4;
      font-size: .7rem;
    }

    thead th.sorted .sort-icon { opacity: 1; color: var(--accent); }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background .15s;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--row-hover); }

    td {
      padding: .65rem .9rem;
      white-space: nowrap;
      vertical-align: middle;
    }

    /* ─── Rank cell ─────────────────────────────────────────────── */
    .rank-cell {
      text-align: center;
      font-weight: 700;
      font-size: .9rem;
      min-width: 2.2rem;
      display: inline-block;
    }

    .rank-1 { color: var(--gold); }
    .rank-2 { color: var(--silver); }
    .rank-3 { color: var(--bronze); }

    /* ─── Student ID ────────────────────────────────────────────── */
    .student-id {
      font-weight: 600;
      font-size: .85rem;
    }

    /* ─── Time cell ─────────────────────────────────────────────── */
    .time-cell { color: var(--text-dim); font-size: .78rem; }

    /* ─── Score cell ─────────────────────────────────────────────── */
    .total-score {
      font-weight: 700;
      font-size: .95rem;
      color: var(--accent);
    }

    /* ─── Level cell ────────────────────────────────────────────── */
    .level-cell {
      text-align: center;
      position: relative;
    }

    .kill-count {
      font-weight: 600;
      font-size: .85rem;
    }

    .kill-count.passed  { color: var(--green); }
    .kill-count.failed  { color: var(--red); }
    .kill-count.no-data { color: var(--muted); }
    .kill-count.final   { color: var(--accent); }


    /* ─── Tooltip (JS-positioned, fixed) ───────────────────────── */
    .tooltip-anchor {
      display: inline-block;
      cursor: default;
    }

    #ftip {
      position: fixed;
      z-index: 9999;
      background: #0a0c17;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: .65rem .85rem;
      min-width: 170px;
      font-size: .76rem;
      line-height: 1.75;
      text-align: left;
      white-space: normal;
      box-shadow: 0 8px 32px rgba(0,0,0,.6);
      pointer-events: none;
      opacity: 0;
      transition: opacity .12s;
    }

    #ftip.visible { opacity: 1; }

    #ftip::after {
      content: '';
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border: 6px solid transparent;
      border-top-color: var(--border);
    }

    .tooltip-title {
      font-weight: 700;
      color: var(--text);
      margin-bottom: .3rem;
      font-size: .78rem;
    }

    .tooltip-row {
      display: flex;
      justify-content: space-between;
      gap: .8rem;
    }

    .tooltip-label { color: var(--text-dim); }
    .tooltip-val   { color: var(--text); font-weight: 600; }

    /* ─── Level header info icon ─────────────────────────────────── */
    .th-inner {
      display: inline-flex;
      align-items: center;
      gap: .3rem;
    }

    .info-icon {
      color: var(--muted);
      font-size: .6rem;
      border: 1px solid currentColor;
      border-radius: 50%;
      width: 13px; height: 13px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-style: normal;
      cursor: default;
    }

    /* ─── Loading / empty ───────────────────────────────────────── */
    .state-msg {
      text-align: center;
      padding: 3rem;
      color: var(--muted);
      font-size: .9rem;
    }

    .spinner {
      display: inline-block;
      width: 18px; height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin-right: .5rem;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }


    @media (max-width: 640px) {
      h1  { font-size: 1.1rem; }
      td, th { padding: .5rem .55rem; font-size: .74rem; }
    }
  </style>
</head>
<body>

<header>
<h1>NTU 2026 Spring 2 DRL HW3-2 LeaderBoard</h1>
</header>

<p class="deploy-time" id="deployTime"></p>

<div class="table-wrap">
  <table>
    <thead id="thead"></thead>
    <tbody id="tbody">
      <tr><td colspan="20" class="state-msg"><span class="spinner"></span>Loading…</td></tr>
    </tbody>
  </table>
</div>

<div class="legend">
  <div class="legend-item"><div class="dot" style="background:var(--green)"></div>Passed threshold</div>
  <div class="legend-item"><div class="dot" style="background:var(--red)"></div>Below threshold</div>
  <div class="legend-item"><div class="dot" style="background:var(--accent)"></div>Final level (no threshold)</div>
  <div class="legend-item"><div class="dot" style="background:var(--muted)"></div>Not attempted / blocked</div>
</div>


<script>
/* ── Static config ─────────────────────────────────────────────── */
const LEVELS = [
  { name: "SeekAndSlayLevel0-v0",  map: "default",                    threshold: 22   },
  { name: "SeekAndSlayLevel1_6-v0",map: "mixed_enemies",              threshold: 15   },
  { name: "SeekAndSlayLevel2_1-v0",map: "blue_shadows",               threshold: 9    },
  { name: "SeekAndSlayLevel3_1-v0",map: "blue_mixed_resized_enemies", threshold: 7    },
  { name: "SeekAndSlayLevel4-v0",  map: "complete",                   threshold: null },
];

// Short display labels: L0, L1.6, L2.1, L3.1, L4
function shortLabel(name) {
  const m = name.match(/Level(\d+)(?:_(\d+))?/i);
  if (!m) return name;
  return m[2] ? `L${m[1]}.${m[2]}` : `L${m[1]}`;
}

function computeScore(levels) {
  let s = 0;
  for (const lvl of LEVELS) {
    const e = levels?.[lvl.name];
    if (!e) continue;
    s += (e.kills ?? 0) * 0.8 + (e.health ?? 0) * 0.1 + (e.ammo ?? 0) * 0.1;
  }
  return Math.round(s * 100) / 100;
}

function levelsReached(levels) {
  return LEVELS.filter(lvl => levels?.[lvl.name] != null).length;
}

// Composite rank key: primary = levels reached, secondary = formula score
function rankVal(entry) {
  return levelsReached(entry.levels) * 1e7 + (entry.total_score ?? 0);
}

/* ── State ─────────────────────────────────────────────────────── */
let DATA    = [];
let sortKey = "total_score";
let sortAsc = false;

/* ── Data loading ──────────────────────────────────────────────── */
async function init() {
  try {
    const r = await fetch("leaderboard.json?_=" + Date.now());
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const raw = await r.json();
    DATA = raw.map(e => ({ ...e, total_score: computeScore(e.levels) }));

    const lm = r.headers.get("Last-Modified");
    if (lm) {
      const d = new Date(lm);
      document.getElementById("deployTime").textContent =
        "Last updated: " + d.toLocaleString([], { dateStyle: "medium", timeStyle: "short" });
    }

    render();
  } catch (e) {
    document.getElementById("tbody").innerHTML =
      `<tr><td colspan="20" class="state-msg">⚠ Failed to load data: ${esc(e.message)}</td></tr>`;
  }
}

/* ── Header ────────────────────────────────────────────────────── */
const COL_DEFS = [
  { key: "rank",            label: "#",            sortable: false },
  { key: "student_id",      label: "Student ID",   sortable: true  },
  { key: "submission_time", label: "Submitted",    sortable: true  },
  { key: "total_score",     label: "Total Score",  sortable: true  },
  ...LEVELS.map(l => ({ key: "lvl__" + l.name, label: shortLabel(l.name), sortable: true, level: l })),
];

function buildHeader() {
  const tr = document.createElement("tr");
  COL_DEFS.forEach(col => {
    const th = document.createElement("th");
    const isSorted = col.key === sortKey;
    const icon = col.sortable
      ? `<span class="sort-icon">${isSorted ? (sortAsc ? "↑" : "↓") : "↕"}</span>`
      : "";

    if (col.level) {
      const l = col.level;
      const thrVal = l.threshold != null ? `${l.threshold} kills` : "none (final)";
      const tipHtml = [
        `<div class="tooltip-title">${esc(l.name)}</div>`,
        `<div class="tooltip-row"><span class="tooltip-label">Map</span><span class="tooltip-val">${esc(l.map)}</span></div>`,
        `<div class="tooltip-row"><span class="tooltip-label">Threshold</span><span class="tooltip-val">${thrVal}</span></div>`,
      ].join("");
      th.innerHTML = `
        <div class="th-inner">
          ${col.label}
          <i class="info-icon tooltip-anchor" data-tip="${tipHtml.replace(/"/g,"&quot;")}">i</i>
          ${icon}
        </div>`;
    } else {
      th.innerHTML = col.label + icon;
    }

    if (col.key === "rank")       th.classList.add("col-rank");
    if (col.key === "student_id") th.classList.add("col-sid");
    if (isSorted) th.classList.add("sorted");
    if (col.sortable) {
      th.addEventListener("click", () => {
        if (sortKey === col.key) { sortAsc = !sortAsc; }
        else { sortKey = col.key; sortAsc = col.key === "student_id" || col.key === "submission_time"; }
        render();
      });
    }
    tr.appendChild(th);
  });
  document.getElementById("thead").replaceChildren(tr);
}

/* ── Sorting ────────────────────────────────────────────────────── */
function getVal(e, key) {
  if (key === "total_score")     return rankVal(e);   // composite: levels reached first
  if (key === "student_id")      return e.student_id  ?? "";
  if (key === "submission_time") return e.submission_time ?? "";
  if (key.startsWith("lvl__"))   return e.levels?.[key.slice(5)]?.kills ?? -1;
  return 0;
}

function sorted() {
  return [...DATA].sort((a, b) => {
    const va = getVal(a, sortKey), vb = getVal(b, sortKey);
    if (typeof va === "string") return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
    return sortAsc ? va - vb : vb - va;
  });
}

/* ── Render ─────────────────────────────────────────────────────── */
function render() {
  buildHeader();
  const tbody = document.getElementById("tbody");

  if (DATA.length === 0) {
    tbody.innerHTML = `<tr><td colspan="20" class="state-msg">No submissions yet.</td></tr>`;
    return;
  }

  // Rank by composite key: levels reached first, then formula score
  const byScore = [...DATA].sort((a, b) => rankVal(b) - rankVal(a));
  const rankMap = Object.fromEntries(byScore.map((e, i) => [e.student_id, i + 1]));

  const rows = sorted().map(entry => {
    const rank = rankMap[entry.student_id];
    const rankClass = rank <= 3 ? `rank-${rank}` : "";
    const rankStr   = rank === 1 ? "🥇" : rank === 2 ? "🥈" : rank === 3 ? "🥉" : rank;

    const tRaw = entry.submission_time ? new Date(entry.submission_time) : null;
    const timeStr = tRaw
      ? tRaw.toLocaleDateString() + " " + tRaw.toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"})
      : "—";

    const levelCells = LEVELS.map(lvl => {
      const ld = entry.levels?.[lvl.name];
      if (!ld) return `<td class="level-cell"><span class="kill-count no-data">—</span></td>`;

      const kills  = ld.kills  ?? 0;
      const health = ld.health ?? 0;
      const ammo   = ld.ammo   ?? 0;
      const contrib = Math.round((kills * 0.8 + health * 0.1 + ammo * 0.1) * 100) / 100;

      let klass = "final";
      if (lvl.threshold != null) {
        klass = kills >= lvl.threshold ? "passed" : "failed";
      }

      const tipHtml = [
        `<div class="tooltip-title">${esc(shortLabel(lvl.name))}</div>`,
        `<div class="tooltip-row"><span class="tooltip-label">Kills</span><span class="tooltip-val">${kills}</span></div>`,
        `<div class="tooltip-row"><span class="tooltip-label">Health</span><span class="tooltip-val">${health}</span></div>`,
        `<div class="tooltip-row"><span class="tooltip-label">Ammo</span><span class="tooltip-val">${ammo}</span></div>`,
        `<div class="tooltip-row"><span class="tooltip-label">Score contrib.</span><span class="tooltip-val">+${contrib}</span></div>`,
      ].join("").replace(/"/g, "&quot;");

      return `
        <td class="level-cell">
          <span class="tooltip-anchor" data-tip="${tipHtml}">
            <span class="kill-count ${klass}">${kills}</span>
          </span>
        </td>`;
    }).join("");

    return `
      <tr>
        <td class="col-rank"><span class="rank-cell ${rankClass}">${rankStr}</span></td>
        <td class="col-sid"><span class="student-id">${esc(entry.student_id)}</span></td>
        <td><span class="time-cell">${timeStr}</span></td>
        <td><span class="total-score">${(entry.total_score ?? 0).toFixed(2)}</span></td>
        ${levelCells}
      </tr>`;
  });

  tbody.innerHTML = rows.join("");
}

function esc(s) {
  return String(s)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;");
}

/* ── Floating tooltip ──────────────────────────────────────────── */
const ftip = document.createElement("div");
ftip.id = "ftip";
document.body.appendChild(ftip);

document.addEventListener("mouseover", e => {
  const anchor = e.target.closest(".tooltip-anchor");
  if (!anchor) return;
  const html = anchor.dataset.tip;
  if (!html) return;
  ftip.innerHTML = html;
  ftip.classList.add("visible");
  positionTip(anchor);
});

document.addEventListener("mouseout", e => {
  if (!e.target.closest(".tooltip-anchor")) return;
  ftip.classList.remove("visible");
});

document.addEventListener("scroll", () => ftip.classList.remove("visible"), true);

function positionTip(anchor) {
  const r = anchor.getBoundingClientRect();
  // Temporarily show to measure size
  ftip.style.left = "0";
  ftip.style.top  = "0";
  const tw = ftip.offsetWidth;
  const th = ftip.offsetHeight;

  let left = r.left + r.width / 2 - tw / 2;
  let top  = r.top - th - 10;

  // Clamp horizontally
  const margin = 8;
  left = Math.max(margin, Math.min(left, window.innerWidth - tw - margin));

  // Flip below if not enough room above
  if (top < margin) top = r.bottom + 10;

  ftip.style.left = left + "px";
  ftip.style.top  = top  + "px";
}

/* ── Boot ───────────────────────────────────────────────────────── */
init();
</script>
</body>
</html>
